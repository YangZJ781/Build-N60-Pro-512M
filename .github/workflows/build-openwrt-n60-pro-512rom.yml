name: build-openwrt-n60-pro-512rom

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-openwrt-n60-pro-512rom.yml"
      - "configs/**"
      - "patches/**"
      - "README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_REPO: https://git.openwrt.org/openwrt/openwrt.git
  OPENWRT_REF: v25.12.5
  CONFIG_FILE: configs/netcore_n60-pro-512rom.config
  PATCH_FILE: patches/0001-mediatek-filogic-add-netcore-n60-pro-512rom.patch
  TZ: UTC

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare builder
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext gcc-multilib g++-multilib git gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool lld lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-docutils python3-pip python3-ply \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$USER" /workdir

      - name: Clone OpenWrt source
        working-directory: /workdir
        run: |
          git clone --depth=1 --branch "$OPENWRT_REF" "$OPENWRT_REPO" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: Apply local patch
        run: |
          cd openwrt
          git apply --check "$GITHUB_WORKSPACE/$PATCH_FILE"
          git apply "$GITHUB_WORKSPACE/$PATCH_FILE"

      - name: Update feeds
        run: |
          cd openwrt
          max_retries=3
          retry_delay_seconds=10
          for attempt in $(seq 1 "$max_retries"); do
            if ./scripts/feeds update -a; then
              break
            fi
            if [ "$attempt" -eq "$max_retries" ]; then
              echo "Error: feeds update failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "feeds update failed on attempt ${attempt}, retrying..." >&2
            rm -rf feeds/*
            sleep $((attempt * retry_delay_seconds))
          done

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Add argon theme
        run: |
          git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git openwrt/package/luci-theme-argon

      - name: Load custom config
        run: |
          cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          make defconfig
          ./scripts/diffconfig.sh || true

      - name: Download packages
        run: |
          cd openwrt
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          cd openwrt
          openwrt_dir="$(pwd -P)"
          echo "$(nproc) threads build"
          make tools/sed/compile -j"$(nproc)" || make tools/sed/compile -j1 V=s
          make tools/meson/compile -j1 || make tools/meson/compile -j1 V=s
          openssl_bin="$(command -v openssl)"
          if [ -z "$openssl_bin" ]; then
            echo "Error: openssl binary not found on runner PATH" >&2
            exit 1
          fi
          mkdir -p "$openwrt_dir/staging_dir/host/bin"
          ln -sf "$openssl_bin" "$openwrt_dir/staging_dir/host/bin/openssl"
          make toolchain/compile -j"$(nproc)" || make toolchain/compile -j1 V=s
          make package/libs/mbedtls/compile -j1 || make package/libs/mbedtls/compile -j1 V=s
          make -j"$(nproc)" || make -j1 V=s
          echo "FILE_DATE=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

      - name: Organize artifacts
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_DIR=$PWD" >> "$GITHUB_ENV"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-netcore-n60-pro-512rom-${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE_DIR }}
          if-no-files-found: error
